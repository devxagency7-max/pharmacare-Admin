<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tamenny Admin</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons for icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Login Specific CSS -->
    <link rel="stylesheet" href="css/login.css">
</head>

<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            
            <div class="logo-container" style="text-align: center; margin-bottom: 25px;">
                <img src="logo.jpeg" alt="Logo" style="height: 120px; width: auto; object-fit: contain;">
            </div>

            <!-- Header Text -->
            <h2 class="login-title">Tamenny</h2>
            <p class="login-subtitle">Admin Login</p>

            <!-- Login Form -->
            <form id="login-form" class="login-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class='bx bx-envelope'></i>
                        <input type="email" id="email" placeholder="Enter Admin Email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class='bx bx-lock-alt'></i>
                        <input type="password" id="password" placeholder="••••••••••••" required>
                    </div>
                </div>

                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </label>
                </div>

                <button type="submit" class="btn-login">Sign In as Admin</button>
            </form>

            <div class="login-footer">
                Protected by DevX security
            </div>
        </div>
    </div>
    <script src="js/api/apiClient.js"></script>
    <script src="js/pages/login.js"></script>
</body>

</html>
